#exec-once = /nix/store/pb9dhpk6qxjybb8p7prvs18ls2vxk51a-dbus-1.14.10/bin/dbus-update-activation-environment --systemd DISPLAY HYPRLAND_INSTANCE_SIGNATURE WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_TYPE && systemctl --user stop hyprland-session.target && systemctl --user start hyprland-session.target
$fileManager=dolphin
$mainMod=SUPER
$terminal=alacritty
animations {
  bezier=easeOutQuint,0.23,1,0.32,1
  bezier=easeInOutCubic,0.65,0.05,0.36,1
  bezier=linear,0,0,1,1
  bezier=almostLinear,0.5,0.5,0.75,1.0
  bezier=quick,0.15,0,0.1,1
  animation=global, 1, 10, default
  animation=border, 1, 5.39, easeOutQuint
  animation=windows, 1, 4.79, easeOutQuint
  animation=windowsIn, 1, 4.1, easeOutQuint, popin 87%
  animation=windowsOut, 1, 1.49, linear, popin 87%
  animation=fadeIn, 1, 1.73, almostLinear
  animation=fadeOut, 1, 1.46, almostLinear
  animation=fade, 1, 3.03, quick
  animation=layers, 1, 3.81, easeOutQuint
  animation=layersIn, 1, 4, easeOutQuint, fade
  animation=layersOut, 1, 1.5, linear, fade
  animation=fadeLayersIn, 1, 1.79, almostLinear
  animation=fadeLayersOut, 1, 1.39, almostLinear
  animation=workspaces, 1, 1.94, almostLinear, fade
  animation=workspacesIn, 1, 1.21, almostLinear, fade
  animation=workspacesOut, 1, 1.94, almostLinear, fade
  enabled=yes, please :)
}

bind=$mainMod, Q, exec, $terminal
bind=$mainMod, C, killactive,
bind=$mainMod, M, exit,
bind=$mainMod, E, exec, $fileManager
bind=$mainMod, F, togglefloating,
bind=$mainMod, D, fullscreen, toggle
#bind=$mainMod, J, togglesplit,
bind=$mainMod, space , exec, vicinae open
bind=$mainMod, V, exec, vicinae vicinae://launch/clipboard/history
bind=$mainMod, W, exec, zen
bind=, PRINT,exec, hyprshot -m region -o /home/olivernix/Pictures/Screenshots
bind=shift, PRINT, exec, hyprshot -m window -o /home/olivernix/Pictures/Screenshots
bind=shift_control, PRINT, exec, hyprshot -m output -o /home/olivernix/Pictures/Screenshots
bind=$mainMod_SHIFT, C, forcekillactive
bind=$mainMod_SHIFT, M, exec, shutdown -h now
bind=$mainMod_SHIFT_CONTROL, M, exec, shutdown --reboot now
bind=$mainMod, L, exec, lutris
bind=$mainMod, left, movefocus, l
bind=$mainMod, right, movefocus, r
bind=$mainMod, up, movefocus, u
bind=$mainMod, down, movefocus, d
bind=$mainMod, 1, workspace, 1
bind=$mainMod, 2, workspace, 2
bind=$mainMod, 3, workspace, 3
bind=$mainMod, 4, workspace, 4
bind=$mainMod, 5, workspace, 5
bind=$mainMod, 6, workspace, 6
bind=$mainMod, 7, workspace, 7
bind=$mainMod, 8, workspace, 8
bind=$mainMod, 9, workspace, 9
bind=$mainMod, 0, workspace, 10
bind=$mainMod SHIFT, 1, movetoworkspace, 1
bind=$mainMod SHIFT, 2, movetoworkspace, 2
bind=$mainMod SHIFT, 3, movetoworkspace, 3
bind=$mainMod SHIFT, 4, movetoworkspace, 4
bind=$mainMod SHIFT, 5, movetoworkspace, 5
bind=$mainMod SHIFT, 6, movetoworkspace, 6
bind=$mainMod SHIFT, 7, movetoworkspace, 7
bind=$mainMod SHIFT, 8, movetoworkspace, 8
bind=$mainMod SHIFT, 9, movetoworkspace, 9
bind=$mainMod SHIFT, 0, movetoworkspace, 10
bind=$mainMod, S, togglespecialworkspace, magic
bind=$mainMod SHIFT, S, movetoworkspace, special:magic
bind=$mainMod, mouse_down, workspace, e+1
bind=$mainMod, mouse_up, workspace, e-1

bindel=,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel=,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel=,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel=,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel=,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel=,XF86MonBrightnessDown, exec, brightnessctl s 10%-

bindl=, XF86AudioNext, exec, playerctl next
bindl=, XF86AudioPause, exec, playerctl play-pause
bindl=, XF86AudioPlay, exec, playerctl play-pause
bindl=, XF86AudioPrev, exec, playerctl previous

bindm=$mainMod, mouse:272, movewindow
bindm=$mainMod, mouse:273, resizewindow

decoration {
  blur {
    enabled=true
    passes=1
    size=3
    vibrancy=0.169600
  }

  shadow {
    color=rgba(1a1a1aee)
    enabled=true
    range=4
    render_power=3
  }
  active_opacity=1.000000
  inactive_opacity=1.000000
  rounding=10
  rounding_power=2
}

device {
  name=epic-mouse-v1
  sensitivity=-0.500000
}

dwindle {
  preserve_split=true
}

env=XMODIFIERS,@im=fcitx
env=SDL_IM_MODULE,fcitx
env=GLFW_IM_MODULE,fcitx
env=QT_QPA_PLATFORMTHEME,qt6ct
env=XCURSOR_THEME,miku-cursor-linux
env=XCURSOR_SIZE,24
env=HYPRCURSOR_SIZE,24
env=LIBVA_DRIVER_NAME,nvidia
env=__GLX_VENDOR_LIBRARY_NAME,nvidia
env=QT_QPA_PLATFORMTHEME,qt6ct

exec=gsettings set org.gnome.desktop.interface gtk-theme "arc-gtk-theme"
exec=gsettings set org.gnome.desktop.interface color-scheme "prefer-dark"
exec=gsettings set org.gnome.desktop.interface color-scheme "prefer-dark"
exec=gsettings set org.gnome.desktop.interface gtk-theme "adw-gtk3"

exec-once=swaync
exec-once=vicinae server
exec-once=/home/oliverlin/.config/hypr/xdph.sh
exec-once=systemctl --user start hyprpolkitagent
exec-once=hyprnotify
exec-once=hyprpaper
exec-once=waybar
exec-once=awww-daemon
exec-once=awww img "/home/olivernix/.steam/steam/steamapps/common/Paper Lily - Chapter 1/EXTRA/Wallpapers/wp_poll_2024.png"
exec-once=qbittorrent
exec-once=nicotine
exec-once=kdeconnectd
exec-once=fcitx5
exec-once=polychromatic-tray-apple
exec-once=iwctl station wlan0 connect MiFibra-3020-5G
exec-once=wl-clip-persist --clipboard regular
exec-once=wl-paste --type text --watch cliphist store
exec-once=wl-paste --type image --watch cliphist store

general {
  allow_tearing=false
  border_size=2
  col.active_border=rgba(33ccffee) rgba(00ff99ee) 45deg
  col.inactive_border=rgba(595959aa)
  gaps_in=5
  gaps_out=20
  layout=dwindle
  resize_on_border=true
}

input {
  touchpad {
    natural_scroll=true
  }
  follow_mouse=1
  kb_layout=es
  kb_model=
  kb_options=
  kb_rules=
  kb_variant=
  sensitivity=0
}

master {
  new_status=master
}

misc {
  disable_hyprland_logo=false
  force_default_wallpaper=-1
}

monitor=eDP-1, 1920x1080@60.16Hz, 0x0, 1
monitor=, preferred, auto, 1

windowrule=match:class .*, suppress_event maximize
windowrule=match:title ^(Gamescope)$, maximize on
autogenerated=0
